<!DOCTYPE html>
<html lang="en" data-page="watch">
  <head>
      <meta charset="UTF-8">
      <meta name="viewport" content="width=device-width, initial-scale=1.0">
      <title>MiiTube | Videos</title>
      <link rel="icon" type="image/png" href="/assets/img/favicon.png">

      <script src="/assets/js/navbar.js" defer></script>

      <link rel="stylesheet" href="/assets/css/main.css">
      <link rel="stylesheet" href="/assets/css/viewer.css">
      <style>
        .hidepls {
            display: none !important;
        }
      </style>
  </head>
  <body>
      <main>
        <div id="video-player">
            <iframe id="video-embed" width="560" height="315" src="/assets/loading.html" title="YouTube video player" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" referrerpolicy="strict-origin-when-cross-origin" allowfullscreen></iframe>
            <div id="video-info">
                <div id="maininfo">
                    <div id="videometa">
                        <img id="pfp" src="">
                        <div id="texts">
                            <span id="title">Loading video information..</span><br>
                            <span id="author">plz wait</span>
                        </div>
                    </div>
                    <div id="videostats" class="hidepls">
                        👁️ 0 views • 👍 0 likes
                    </div>
                </div>
                <div id="actions" class="hidepls">
                    <button id="like" class="button green tooltip" onclick="alert('Yeah!')" data-tooltip="Upvote"><span>E</span> Yeah!</button>
                    <button id="dislike" class="button red tooltip" onclick="alert('Yeah!')" data-tooltip="Downvote"><span>1</span></button>
                    <button id="report" class="button blue tooltip" onclick="alert('commenting')" data-tooltip="Comment"><span>n</span></button>
                </div>
            </div>
        </div>
      </main>

      <script type="module" src="/assets/js/viewer.js"></script>
      <script type="module" src="/assets/js/main.js"></script>
      <script>
        (function () {
            const params = new URLSearchParams(window.location.search);
            if (params.get('showHidden') === '1') {
                document.querySelectorAll('.hidepls').forEach(el => {
                    el.classList.remove('hidepls');
                });
            }
        })();
      </script>
  </body>
</html>
