<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <title>Looping Background</title>
        <style>
            /* Yes, I compacted it into one line. Yes, it's terrible. Cry about it. - trtl */
            body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; }
            #bgVideo { position: fixed; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; z-index: -1; filter: blur(6px); }
            .content { position: relative; z-index: 1; color: rgb(49, 49, 49); text-align: center; font-family: sans-serif; padding-top: 50px; }
        </style>
    </head>
    <body>
        <video id="bgVideo" autoplay muted loop playsinline>
            <source src="/assets/video/wiiu_background.mp4" type="video/mp4">
        </video>

        <div class="content">
            <h1>Hello World</h1>
            <p>This is a test for the wii u background.</p>
        </div>
    </body>
</html>
